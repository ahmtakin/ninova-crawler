version: "3.8"

services:
  # ── Node.js Application ──────────────────────────────
  app:
    build: .
    container_name: ninova-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/ninova
      - REDIS_QUEUE_URL=redis://redis-queue:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - MAX_QUEUE_DEPTH=10000
      - MAX_REQUESTS_PER_SECOND=10
      - MAX_CONCURRENT_FETCHES=5
      - REQUEST_TIMEOUT_MS=10000
      - MAX_PAGE_SIZE_BYTES=5242880
    depends_on:
      mongo:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ninova-net

  # ── MongoDB ──────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ninova-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ninova-net

  # ── Redis #1: Job Queue (BullMQ) ────────────────────
  redis-queue:
    image: redis:7-alpine
    container_name: ninova-redis-queue
    ports:
      - "6379:6379"
    volumes:
      - redis-queue-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ninova-net

  # ── Redis #2: Cache & Visited Sets ──────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: ninova-redis-cache
    ports:
      - "6380:6379"
    volumes:
      - redis-cache-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ninova-net

volumes:
  mongo-data:
  redis-queue-data:
  redis-cache-data:

networks:
  ninova-net:
    driver: bridge
